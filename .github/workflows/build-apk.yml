name: Build Android APK

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Write local.properties
        working-directory: ./avtoassist/mobile/avtoassist_mobile/android
        run: echo "flutter.sdk=$FLUTTER_ROOT" > local.properties

      - name: Install dependencies
        working-directory: ./avtoassist/mobile/avtoassist_mobile
        run: flutter pub get

      - name: Clean previous builds
        working-directory: ./avtoassist/mobile/avtoassist_mobile
        run: flutter clean

      - name: Run Flutter analyze (non-blocking)
        working-directory: ./avtoassist/mobile/avtoassist_mobile
        run: flutter analyze || true

      - name: Build APK
        working-directory: ./avtoassist/mobile/avtoassist_mobile
        run: flutter build apk --release

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: avtohelp-release-${{ github.run_number }}
          path: avtoassist/mobile/avtoassist_mobile/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
          if-no-files-found: error

      - name: Create Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: avtoassist/mobile/avtoassist_mobile/build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
