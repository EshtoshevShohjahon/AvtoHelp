name: Build Android APK

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true
      
      - name: Flutter doctor
        run: flutter doctor -v
      
      - name: Get dependencies
        working-directory: ./mobile
        run: flutter pub get
      
      - name: Analyze code
        working-directory: ./mobile
        run: flutter analyze || echo "Analysis warnings found, continuing..."
      
      - name: Run tests
        working-directory: ./mobile
        run: flutter test || echo "No tests found"
      
      - name: Clean build
        working-directory: ./mobile
        run: flutter clean
      
      - name: Build APK (with verbose logging)
        working-directory: ./mobile
        run: flutter build apk --release --verbose
      
      - name: Verify APK exists
        working-directory: ./mobile
        run: |
          if [ -f "build/app/outputs/flutter-apk/app-release.apk" ]; then
            echo "✅ APK successfully built"
            ls -lh build/app/outputs/flutter-apk/app-release.apk
          else
            echo "❌ APK file not found!"
            exit 1
          fi
      
      - name: Get APK info
        id: apk_info
        working-directory: ./mobile
        run: |
          APK_PATH="build/app/outputs/flutter-apk/app-release.apk"
          APK_SIZE=$(du -h $APK_PATH | cut -f1)
          echo "apk_size=$APK_SIZE" >> $GITHUB_OUTPUT
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
      
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: avtohelp-release-${{ github.sha }}
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
      
      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: mobile/build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Comment on PR with APK info
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ APK built successfully!\n\n📦 Size: ${{ steps.apk_info.outputs.apk_size }}\n📥 Download from Artifacts tab'
            })
