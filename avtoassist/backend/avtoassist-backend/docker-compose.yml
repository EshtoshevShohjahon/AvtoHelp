version: "3.8"
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: avtoassist
      POSTGRES_PASSWORD: avtoassist
      POSTGRES_DB: avtoassist
    ports:
      - "5432:5432"
    volumes:
      - avtoassist_pgdata:/var/lib/postgresql/data

volumes:
  avtoassist_pgdata:
