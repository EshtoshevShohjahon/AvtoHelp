# Render.com Blueprint — AvtoAssist backendni internetga joylash
# Hujjat: https://render.com/docs/blueprint-spec
#
# Foydalanish:
#   1. render.com -> New -> Blueprint
#   2. GitHub repo: EshtoshevShohjahon/avtohelp ni ulang
#   3. Render shu faylni avtomatik o'qiydi va hammasini yaratadi
#
# Web servis + bepul PostgreSQL bazasi avtomatik bog'lanadi.

databases:
  - name: avtoassist-db
    databaseName: avtoassist
    plan: free

services:
  - type: web
    name: avtoassist-api
    runtime: node
    plan: free
    rootDir: avtoassist/backend/avtoassist-backend
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_DIALECT
        value: postgres
      - key: DB_SSL
        value: "true"
      # Postgres ulanish satri avtomatik bog'lanadi
      - key: DATABASE_URL
        fromDatabase:
          name: avtoassist-db
          property: connectionString
      # JWT kaliti avtomatik xavfsiz yaratiladi
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES
        value: 15m
      - key: JWT_REFRESH_EXPIRES
        value: 30d
      - key: DEFAULT_LANGUAGE
        value: uz
      # Test bosqichida OTP kodni javobda qaytaradi (SMS shart emas).
      # Haqiqiy ishga tushganda "false" qiling va SMS provayder ulang.
      - key: OTP_DEBUG_MODE
        value: "true"
